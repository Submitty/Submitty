name: Move drafts to WIP and un-drafts to seeking reviewer
on:
  pull_request_target:
    types:
      - opened
      - converted_to_draft
      - ready_for_review

permissions:
  contents: read

env:
  PR_ID: ${{ github.event.pull_request.number }}

jobs:
  sort-drafts:
    name: Move drafts to WIP and un-drafts to seeking reviewer
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PEM }}

      - name: Checkout the repo
        uses: actions/checkout@v6

      - name: Get or add PR project ID
        id: get-pr-id
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          source .github/bin/board_automation_helper.sh

          PR_PROJECT_ITEMS_JSON="$(gh project item-list -L 9999 --owner Submitty 1 --format json)"
          PR_PROJECT_ID="$(printf '%s\n' "$PR_PROJECT_ITEMS_JSON" | jq -r --arg pr_id "$PR_ID" '.items[] | {id, number: .content.number} | select((.number | tostring) == $pr_id) | .id')"

          if [ -z "$PR_PROJECT_ID" ]; then
            PR_NODE_ID="$(gh api graphql -F owner=Submitty -F repo=Submitty -F number="$PR_ID" -f query='query($owner:String!,$repo:String!,$number:Int!){ repository(owner:$owner,name:$repo){ pullRequest(number:$number){ id } } }' --jq '.data.repository.pullRequest.id')"
            gh project item-add --project-id "$PROJECT_ID" --content-id "$PR_NODE_ID" >/dev/null

            PR_PROJECT_ITEMS_JSON="$(gh project item-list -L 9999 --owner Submitty 1 --format json)"
            PR_PROJECT_ID="$(printf '%s\n' "$PR_PROJECT_ITEMS_JSON" | jq -r --arg pr_id "$PR_ID" '.items[] | {id, number: .content.number} | select((.number | tostring) == $pr_id) | .id')"
          fi

          printf 'pr-project-id=%s\n' "$PR_PROJECT_ID" >> "$GITHUB_OUTPUT"

      - name: Move draft to Work in Progress
        if: ${{ (github.event.action == 'converted_to_draft') || ((github.event.action == 'opened') && (github.event.pull_request.draft == true)) }}
        env:
          PR_PROJECT_ID: ${{ steps.get-pr-id.outputs.pr-project-id }}
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          source .github/bin/board_automation_helper.sh
          gh project item-edit --project-id "$PROJECT_ID" --id "$PR_PROJECT_ID" --field-id "$STATUS_FIELD_ID" --single-select-option-id "$WIP_ID"
        shell: bash

      - name: Move ready for review to Seeking Reviewer
        if: ${{ github.event.action == 'ready_for_review' }}
        env:
          PR_PROJECT_ID: ${{ steps.get-pr-id.outputs.pr-project-id }}
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          source .github/bin/board_automation_helper.sh
          gh project item-edit --project-id "$PROJECT_ID" --id "$PR_PROJECT_ID" --field-id "$STATUS_FIELD_ID" --single-select-option-id "$SEEKING_REVIEWER_ID"
        shell: bash
