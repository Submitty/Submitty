codecov:
  notify:
    require_ci_to_pass: true

ignore:
  - "tests/integrationTests"

coverage:
  status:
    project:
      default: false
      migrator:
        flags:
          - migrator
        target: 99%
      vue:
        flags:
          - vue
        target: 95%
    patch: false
    changes: false


flags:
  php:
    paths:
      - site/app
  autograder:
    paths:
      - autograder/autograder
  python_submitty_utils:
    paths:
      - python_submitty_utils/submitty_utils
  migrator:
    paths:
      - migration/migrator
  submitty_daemon_jobs:
    paths:
      - sbin/submitty_daemon_jobs
  vue:
    paths:
      - site/vue/src

comment:
  layout: "reach, diff, flags"
  behavior: once
